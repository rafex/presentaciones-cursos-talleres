<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Pirámide de evolución del desarrollador</title>
  <desc id="desc">Tres niveles: escribe código, usa IA para escribir código y construye sistemas que usan IA.</desc>
  <defs>
    <linearGradient id="top" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1791d0"/>
      <stop offset="1" stop-color="#1167b1"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#35a36f"/>
      <stop offset="1" stop-color="#1f7a4d"/>
    </linearGradient>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b22a7d"/>
      <stop offset="1" stop-color="#8a1e61"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1100" height="620" rx="24" fill="#fbfaf7"/>
  <g filter="url(#shadow)">
    <path d="M550 58 L702 236 H398 Z" fill="url(#top)"/>
    <path d="M398 254 H702 L848 424 H252 Z" fill="url(#mid)"/>
    <path d="M252 442 H848 L970 584 H130 Z" fill="url(#base)"/>
  </g>

  <g font-family="Helvetica Neue, Arial, sans-serif" text-anchor="middle" fill="#ffffff">
    <text x="550" y="143" font-size="30" font-weight="700">Nivel 3</text>
    <text x="550" y="184" font-size="23" font-weight="600">Diseña sistemas</text>
    <text x="550" y="214" font-size="23" font-weight="600">con IA</text>

    <text x="550" y="327" font-size="32" font-weight="700">Nivel 2</text>
    <text x="550" y="371" font-size="27" font-weight="600">Usa IA para</text>
    <text x="550" y="405" font-size="27" font-weight="600">escribir código</text>

    <text x="550" y="505" font-size="34" font-weight="700">Nivel 1</text>
    <text x="550" y="554" font-size="30" font-weight="600">Escribe código</text>
  </g>

  <g fill="none" stroke="#d9d3ca" stroke-width="2" opacity="0.8">
    <path d="M398 236 H702"/>
    <path d="M252 424 H848"/>
  </g>
</svg>
